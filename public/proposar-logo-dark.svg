<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Dark variant without background circle -->
  <defs>
    <linearGradient id="darkLogoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4d94ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066cc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Document/Paper shape -->
  <rect x="65" y="50" width="70" height="90" rx="4" fill="url(#darkLogoGradient)" />
  
  <!-- Document lines -->
  <line x1="75" y1="65" x2="125" y2="65" stroke="white" stroke-width="2" stroke-linecap="round" />
  <line x1="75" y1="80" x2="120" y2="80" stroke="white" stroke-width="1.5" stroke-linecap="round" />
  <line x1="75" y1="92" x2="118" y2="92" stroke="white" stroke-width="1.5" stroke-linecap="round" />
  <line x1="75" y1="104" x2="115" y2="104" stroke="white" stroke-width="1.5" stroke-linecap="round" />
  <line x1="75" y1="116" x2="110" y2="116" stroke="white" stroke-width="1.5" stroke-linecap="round" />
  
  <!-- Arrow -->
  <path d="M 130 125 L 145 110 L 140 110 Q 150 95 155 75" 
        stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Checkmark -->
  <circle cx="150" cy="75" r="8" fill="white" />
  <path d="M 147 75 L 149 77 L 153 73" stroke="#0066cc" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />
</svg>
